# .github/workflows/ci.yml
#
# Continuous-integration matrix for the Kestrel workspace. Runs on
# every push and PR. Three jobs in parallel:
#
#   - check:   `cargo check --workspace --all-targets` (fastest fail)
#   - clippy:  `cargo clippy --workspace --all-targets -- -D warnings`
#   - test:    `cargo test --workspace`
#
# Matrix covers macOS (arm64), Linux (x86_64), and Windows (x86_64).
# All three are required to pass — Windows was previously soft-failed
# while platform-specific issues were shaken out, but the per-OS gates
# in the workspace now build cleanly on all three runners.

name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs when a new push lands on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Don't try to download Cisco's openh264 binary at build time. The
  # `source` feature compiles the upstream C from the cargo registry
  # cache — no network needed once `cargo fetch` completes.
  OPENH264_FROM_SOURCE: "1"

jobs:
  check:
    name: cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install platform deps (Linux)
        if: runner.os == 'Linux'
        run: |
          # AT-SPI / X11 / OpenSSL dev headers + nasm for openh264.
          # rdev needs libxdo / libxtst; xcap needs libxcb.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libatspi2.0-dev \
            libxdo-dev \
            libxtst-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-randr0-dev \
            libdbus-1-dev \
            libssl-dev \
            pkg-config \
            nasm
      - name: Install platform deps (Windows)
        if: runner.os == 'Windows'
        # nasm for openh264. windows-latest GH runners have
        # Chocolatey preinstalled. The openh264 build script also
        # invokes cl.exe via cc-rs, which uses MSVC from the
        # actions/checkout image — no extra setup needed.
        run: choco install nasm -y
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-key: ${{ matrix.os }}-check
      - name: Add nasm to PATH (Windows)
        if: runner.os == 'Windows'
        # choco installs nasm under C:\Program Files\NASM; append it
        # to GITHUB_PATH so subsequent steps see the binary.
        run: echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - run: cargo check --workspace --all-targets

  clippy:
    name: cargo clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install platform deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libatspi2.0-dev \
            libxdo-dev \
            libxtst-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-randr0-dev \
            libdbus-1-dev \
            libssl-dev \
            pkg-config \
            nasm
      - name: Install platform deps (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm -y
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
          cache-key: ${{ matrix.os }}-clippy
      - name: Add nasm to PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install platform deps (Linux)
        if: runner.os == 'Linux'
        run: |
          # AT-SPI / X11 / OpenSSL dev headers + nasm for openh264.
          # rdev needs libxdo / libxtst; xcap needs libxcb.
          # Xvfb gives us a headless display server so capability
          # tests (clipboard, screen, input) actually exercise the
          # X11 paths instead of skipping via has_display() == false.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libatspi2.0-dev \
            libxdo-dev \
            libxtst-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-randr0-dev \
            libdbus-1-dev \
            libssl-dev \
            pkg-config \
            nasm \
            xvfb \
            xauth
      - name: Install platform deps (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm -y
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-key: ${{ matrix.os }}-test
      - name: Add nasm to PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run tests (Linux, under Xvfb)
        if: runner.os == 'Linux'
        # xvfb-run wraps the command so $DISPLAY is set for its
        # subprocess. -a auto-allocates a free display number.
        # The 1280x1024x24 server-args matches a typical desktop
        # so xcap returns realistic dimensions if a test reads them.
        run: |
          xvfb-run -a --server-args="-screen 0 1280x1024x24" \
            cargo test --workspace --no-fail-fast
      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        # macOS capability tests stay skipped by default (TCC needs a
        # real interactive grant); operators opt in by setting
        # KESTREL_HEADFUL=1 on their dev box.
        run: cargo test --workspace --no-fail-fast
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        # No virtual display equivalent in CI. Tests gated by
        # has_display() return early on Windows by default — the
        # rest of the suite runs unconditionally.
        run: cargo test --workspace --no-fail-fast

  coverage:
    name: cargo llvm-cov (ubuntu)
    runs-on: ubuntu-latest
    # Report-only for now — we don't fail the build below a threshold
    # until we know what a baseline "healthy coverage" number looks
    # like for this workspace. Once we've seen it for a few PRs, add
    # `--fail-under-lines N` to gate.
    steps:
      - uses: actions/checkout@v4
      - name: Install platform deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libatspi2.0-dev \
            libxdo-dev \
            libxtst-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-randr0-dev \
            libdbus-1-dev \
            libssl-dev \
            pkg-config \
            nasm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview
          cache-key: ubuntu-coverage
      - name: Install cargo-llvm-cov
        # taiki-e maintains the canonical Rust coverage action. Pinned
        # by version (not @main) so a future breaking change doesn't
        # silently break our coverage run.
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        # `--workspace` to cover every crate. `--all-targets` so
        # integration tests count toward coverage of the lib code
        # they exercise. lcov format for tooling compatibility;
        # `--summary-only` ALSO prints a per-file + total summary
        # to the job log so the PR reviewer can see the number
        # without downloading the artifact.
        run: |
          cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: lcov.info
          retention-days: 14

  # NOTE: A `cargo fmt --check` job is intentionally NOT wired up yet.
  # The codebase has accumulated some fmt drift that should be cleaned
  # up in one focused PR before gating CI on it — otherwise the first
  # CI run blocks every other PR until a massive auto-format lands.
  # When ready: see commented-out `fmt` job in the git history.
